<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a1628;--sur:#0f2040;--card:#162a4a;--bdr:#1e3a5f;--pri:#00d4aa;--acc:#ff6b35;--wrn:#f59e0b;--dng:#ef4444;--ok:#10b981;--pur:#8b5cf6;--pnk:#ec4899;--txt:#e8f4f8;--mut:#8ba3bf;--dim:#3a5a7a}
html,body{height:100%;font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--txt);overflow-x:hidden}
#app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.hdr{background:linear-gradient(135deg,#0f2040,#0a3050);padding:14px 18px;border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:100}
.logo{font-size:21px;font-weight:700;letter-spacing:-.5px}
.logo em{color:var(--pri);font-style:normal}.logo b{color:var(--acc);font-weight:700}
.qs{background:var(--card);border-bottom:1px solid var(--bdr);display:flex;overflow-x:auto}
.qi{flex:0 0 auto;padding:6px 12px;text-align:center;border-right:1px solid var(--bdr)}
.qi:last-child{border-right:none}
.qv{font-size:14px;font-weight:700}.ql{font-size:9px;color:var(--mut);white-space:nowrap}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:#0b1930;border-top:1px solid var(--bdr);display:flex;overflow-x:auto;z-index:100;scrollbar-width:none}
.bnav::-webkit-scrollbar{display:none}
.nb{flex:0 0 auto;min-width:52px;padding:6px 2px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px;font-family:"DM Sans",sans-serif}
.nb span:first-child{font-size:16px}
.nl{font-size:8px;color:var(--mut)}
.nb.on .nl{color:var(--pri);font-weight:700}
.nd{width:16px;height:2px;background:var(--pri);border-radius:1px;margin-top:1px;opacity:0}
.nb.on .nd{opacity:1}
.ct{flex:1;padding:16px;padding-bottom:80px;overflow-y:auto}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:14px;margin-bottom:10px}
.ctt{font-size:14px;font-weight:700;margin-bottom:12px}
.fg{margin-bottom:10px}
.lb{font-size:11px;color:var(--mut);display:block;margin-bottom:4px;font-weight:500}
input,select,textarea{width:100%;background:var(--sur);border:1px solid var(--bdr);border-radius:8px;padding:9px 11px;color:var(--txt);font-size:13px;font-family:"DM Sans",sans-serif;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--pri)}
select option{background:var(--sur)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.btn{border:none;border-radius:8px;padding:9px 16px;font-weight:600;font-size:13px;cursor:pointer;font-family:"DM Sans",sans-serif;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.bp{background:var(--pri);color:#0a1628}
.bg{background:transparent;color:var(--mut);border:1px solid var(--bdr)}
.bd{background:#7f1d1d;color:#fca5a5;border:1px solid #ef444440}
.bw{background:#25D366;color:#fff}
.bf{width:100%;padding:12px}
.bs{padding:5px 10px;font-size:11px;border-radius:6px}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.pk{background:#052e1650;color:#86efac;border:1px solid #10b98140}
.pw{background:#78350f40;color:#fcd34d;border:1px solid #f59e0b40}
.pd{background:#7f1d1d40;color:#fca5a5;border:1px solid #ef444440}
.pr{margin-bottom:8px}
.ph{display:flex;justify-content:space-between;margin-bottom:4px;font-size:11px}
.pt{height:6px;background:var(--bdr);border-radius:3px;overflow:hidden}
.pf{height:100%;border-radius:3px;transition:width .4s}
.ov{position:fixed;inset:0;background:#000b;z-index:200;display:flex;align-items:flex-end;justify-content:center}
.mo{background:var(--sur);border-radius:16px 16px 0 0;padding:18px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.moh{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.mc{background:none;border:none;color:var(--mut);font-size:22px;cursor:pointer;line-height:1}
.tb{display:flex;gap:8px;margin-bottom:12px}
.tbb{flex:1;padding:8px;border-radius:8px;border:1.5px solid var(--bdr);background:transparent;color:var(--mut);font-size:12px;cursor:pointer;font-family:"DM Sans",sans-serif;text-align:center}
.tbb.on{border-color:var(--pri);background:rgba(0,212,170,.12);color:var(--pri);font-weight:700}
.sb{background:var(--sur);border-radius:8px;padding:10px;text-align:center}
.sv{font-size:20px;font-weight:700}.sl{font-size:10px;color:var(--mut)}
.al{padding:10px 12px;border-radius:8px;font-size:12px;margin-bottom:10px}
.ai{background:#0a3050;border:1px solid rgba(0,212,170,.25);color:var(--pri)}
.aw{background:#78350f30;border:1px solid rgba(245,158,11,.25);color:#fcd34d}
.dc{padding:5px 12px;border-radius:20px;border:2px solid var(--bdr);background:transparent;color:var(--mut);font-size:11px;cursor:pointer;font-family:"DM Sans",sans-serif;font-weight:500;display:inline-flex;align-items:center;gap:4px}
.dc.tk{border-color:var(--ok);background:rgba(16,185,129,.15);color:var(--ok)}
.empty{text-align:center;padding:50px 20px;color:var(--mut)}
.ei{font-size:40px;margin-bottom:10px}
.cw{position:relative;height:200px;margin:8px 0}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:var(--sur)}::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}
.tc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div><div class="logo"><em>MUNDI</em><b>MED</b> <span style="font-size:11px;color:var(--pri);font-weight:400;letter-spacing:0">v2.0 ☁️</span></div><div style="font-size:11px;color:var(--mut);margin-top:2px" id="pName">Monitor de Salud Personal</div></div>
      <div style="font-size:11px;color:var(--mut);text-align:right" id="hDate"></div>
    </div>
  </div>
  <div class="qs" id="qsBar" style="display:none"></div>
  <div class="ct" id="main"></div>
  <nav class="bnav" id="nav"></nav>
</div>
<script>

// STORAGE
const S={get:(k,d=null)=>{try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):d}catch(e){return d}},set:(k,v)=>localStorage.setItem(k,JSON.stringify(v))};
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const today=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')};
const nowt=()=>new Date().toTimeString().slice(0,5);
const fd=(d)=>{if(!d)return'—';return new Date(d+'T12:00').toLocaleDateString('es-EC',{day:'2-digit',month:'short'})};
const fdl=(d)=>{if(!d)return'—';return new Date(d+'T12:00').toLocaleDateString('es-EC',{day:'2-digit',month:'long',year:'numeric'})};
const lastNDays=(n)=>{const r=[];for(let i=n-1;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);r.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'))}return r};
const PERIODS=[[7,'7d'],[15,'15d'],[30,'30d'],[90,'3m'],[180,'6m'],[365,'1a']];
function periodBtns(cur,varName){return'<div class="tb">'+PERIODS.map(function(p){return'<button class="tbb'+(cur===p[0]?' on':'')+'" onclick="'+varName+'='+p[0]+';render()">'+p[1]+'</button>'}).join('')+'</div>';}
function groupByWeek(days,getFn){var out=[];for(var i=0;i<days.length;i+=7){var chunk=days.slice(i,i+7);var vals=chunk.map(getFn).filter(function(v){return v!==null&&!isNaN(v)});out.push({lbl:fd(chunk[0])+(chunk.length>1?'–'+fd(chunk[chunk.length-1]):''),vals:vals,avg:vals.length?vals.reduce(function(s,v){return s+v},0)/vals.length:null});}return out;}
const esc=(s)=>(s||'').toString().replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const g=(id)=>document.getElementById(id);
const gv=(id)=>{const e=g(id);return e?e.value:''};
const nval=(m,k)=>parseFloat((m.nutrition&&m.nutrition[k])||0)||0;

// STATE
let P=S.get('mm4_p',{name:'',age:'',sex:'',weight:'',height:'',conditions:'',tfg:'',creatinine:'',proteinLimit:'0.6',sodiumLimit:'2000',potassiumLimit:'2500',phosphorusLimit:'800',calorieGoal:'1800',cholesterolLimit:'200',doctorName:'',doctorWA:'',nutritionistWA:'',specialists:[]});
let MEDS=S.get('mm4_meds',[]);
let DOSES=S.get('mm4_doses',[]);
let MEALS=S.get('mm4_meals',[]);
let EX=S.get('mm4_ex',[]);
let VITALS=S.get('mm4_vitals',[]);
let EXAMS=S.get('mm4_exams',[]);
let SLEEP=S.get('mm4_sleep',[]);
const saveAll=()=>{S.set('mm4_p',P);S.set('mm4_meds',MEDS);S.set('mm4_doses',DOSES);S.set('mm4_meals',MEALS);S.set('mm4_ex',EX);S.set('mm4_vitals',VITALS);S.set('mm4_exams',EXAMS);S.set('mm4_sleep',SLEEP);syncToBackend();setTimeout(function(){if(typeof scheduleAlarmsInSW==='function')scheduleAlarmsInSW()},500)};

// BACKEND
const BACKEND='/api';
const getUserId=()=>{let id=localStorage.getItem('mm4_uid');if(!id){id=uid();localStorage.setItem('mm4_uid',id)}return id};
function syncToBackend(){fetch(BACKEND+'/sync',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:getUserId(),profile:P,medications:MEDS,doses:DOSES,meals:MEALS,exercise:EX,vitals:VITALS,exams:EXAMS,sleep:SLEEP})}).catch(function(e){console.warn('Sync:',e)})}
async function loadFromBackend(){
  try{
    const r=await fetch(BACKEND+'/data?userId='+getUserId());
    if(!r.ok)return;
    const d=await r.json();
    if(d.error)return;
    if(d.profile&&Object.keys(d.profile).length){P=d.profile;S.set('mm4_p',P)}
    if(Array.isArray(d.medications)&&d.medications.length){MEDS=d.medications;S.set('mm4_meds',MEDS)}
    if(Array.isArray(d.doses)&&d.doses.length){DOSES=d.doses;S.set('mm4_doses',DOSES)}
    if(Array.isArray(d.meals)&&d.meals.length){MEALS=d.meals;S.set('mm4_meals',MEALS)}
    if(Array.isArray(d.exercise)&&d.exercise.length){EX=d.exercise;S.set('mm4_ex',EX)}
    if(Array.isArray(d.vitals)&&d.vitals.length){VITALS=d.vitals;S.set('mm4_vitals',VITALS)}
    if(Array.isArray(d.exams)&&d.exams.length){EXAMS=d.exams;S.set('mm4_exams',EXAMS)}
    if(Array.isArray(d.sleep)&&d.sleep.length){SLEEP=d.sleep;S.set('mm4_sleep',SLEEP)}
  }catch(e){console.warn('Load backend:',e)}
}

// EXPORT/IMPORT
function exportData(){
  const data={_v:4,_date:new Date().toISOString(),P,MEDS,DOSES,MEALS,EX,VITALS,EXAMS};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='MUNDIMED_'+today()+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  alert('Datos exportados. Comparte el JSON a tu otro dispositivo e importalo desde Perfil.');
}
function importData(ev){
  const file=ev.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=(e)=>{
    try{
      const d=JSON.parse(e.target.result);
      if(!d.P&&!d.profile)throw new Error('invalid');
      if(!confirm('Importar datos? Esto reemplaza los datos actuales.'))return;
      if(d.P)P=d.P;else if(d.profile)P=d.profile;
      if(d.MEDS)MEDS=d.MEDS;else if(d.meds)MEDS=d.meds;
      if(d.DOSES)DOSES=d.DOSES;else if(d.doses)DOSES=d.doses;
      if(d.MEALS)MEALS=d.MEALS;else if(d.meals)MEALS=d.meals;
      if(d.EX)EX=d.EX;else if(d.exercise)EX=d.exercise;
      if(d.VITALS)VITALS=d.VITALS;else if(d.vitals)VITALS=d.vitals;
      if(d.EXAMS)EXAMS=d.EXAMS;else if(d.exams)EXAMS=d.exams;
      saveAll();render();alert('Datos importados correctamente.');
    }catch(err){alert('Archivo invalido.');}
  };
  reader.readAsText(file);ev.target.value='';
}

// TABS
const TABS=[{id:'perfil',ic:'👤',lb:'Perfil'},{id:'meds',ic:'💊',lb:'Meds'},{id:'dieta',ic:'🥗',lb:'Dieta'},{id:'ejercicio',ic:'🚶',lb:'Ejercicio'},{id:'vitales',ic:'❤️',lb:'Vitales'},{id:'examenes',ic:'🩺',lb:'Exámenes'},{id:'graficos',ic:'📊',lb:'Gráficos'},{id:'reportes',ic:'📋',lb:'Reportes'},{id:'sueno',ic:'🌙',lb:'Sueño'},{id:'agente',ic:'🤖',lb:'Agente'}];
let TAB='perfil';
function navRender(){
  g('nav').innerHTML=TABS.map(t=>'<button class="nb'+(TAB===t.id?' on':'')+'" onclick="go(\''+t.id+'\')">'+'<span>'+t.ic+'</span><span class="nl">'+t.lb+'</span><div class="nd"></div></button>').join('');
}
function go(tab){TAB=tab;navRender();qsRender();render()}

// QUICK STATS
function qsRender(){
  const qs=g('qsBar');
  if(TAB==='perfil'){qs.style.display='none';return}
  const t=today(),tm=MEALS.filter(m=>m.date===t);
  const totC=tm.reduce((s,m)=>s+nval(m,'calories'),0);
  const totPr=tm.reduce((s,m)=>s+nval(m,'protein'),0);
  const totNa=tm.reduce((s,m)=>s+nval(m,'sodium'),0);
  const totK=tm.reduce((s,m)=>s+nval(m,'potassium'),0);
  const totPh=tm.reduce((s,m)=>s+nval(m,'phosphorus'),0);
  const totCh=tm.reduce((s,m)=>s+nval(m,'cholesterol'),0);
  const totSt=EX.filter(e=>e.date===t).reduce((s,e)=>s+(parseInt(e.steps)||0),0);
  qs.style.display='flex';
  qs.innerHTML=[
    {l:'Cal',v:Math.round(totC),m:parseFloat(P.calorieGoal)||1800,c:'var(--acc)'},
    {l:'Prot',v:Math.round(totPr),m:Math.round((parseFloat(P.proteinLimit)||0.6)*(parseFloat(P.weight)||70)),c:'var(--pri)'},
    {l:'Na',v:Math.round(totNa),m:parseFloat(P.sodiumLimit)||2000,c:'var(--wrn)'},
    {l:'K+',v:Math.round(totK),m:parseFloat(P.potassiumLimit)||2500,c:'var(--pur)'},
    {l:'P',v:Math.round(totPh),m:parseFloat(P.phosphorusLimit)||800,c:'var(--pnk)'},
    {l:'Chol',v:Math.round(totCh),m:parseFloat(P.cholesterolLimit)||200,c:'var(--acc)'},
    {l:'Pasos',v:totSt.toLocaleString(),m:0,c:'var(--ok)'}
  ].map(s=>'<div class="qi"><div class="qv" style="color:'+(s.m&&s.v>s.m?'var(--dng)':s.c)+'">'+s.v+'</div><div class="ql">'+s.l+(s.m?'/'+s.m:'')+'</div></div>').join('');
}

// RENDER
function render(){
  g('hDate').textContent=new Date().toLocaleDateString('es-EC',{weekday:'short',day:'2-digit',month:'short'});
  g('pName').textContent=P.name||'Mi Salud Personal';
  const c=g('main');c.innerHTML='';
  const map={perfil:rPerfil,meds:rMeds,dieta:rDieta,ejercicio:rEj,vitales:rVit,examenes:rExam,graficos:rGraf,reportes:rRep,sueno:rSueno,agente:rAgent};
  if(map[TAB])map[TAB](c);
}

// HELPERS
function pbar(lbl,val,max,unit,col){
  const pct=Math.min(100,(val/max)*100);
  const c=pct>100?'var(--dng)':pct>=80?'var(--wrn)':(col||'var(--pri)');

async function callAPI(sys,userMsg,imgs,isPDF,pdfB64){

  if(!r.ok){const err=await r.json();throw new Error(err.error||'Error del servidor '+r.status)}
  const d=await r.json();
  if(d.error)throw new Error(d.error);
  return d.text||'';

function repairJSON(raw){
  let s=raw.replace(/```json|```/g,'').trim();
  const f=s.indexOf('{'),l=s.lastIndexOf('}');
  if(f>=0&&l>f)s=s.slice(f,l+1);
  try{return JSON.parse(s)}catch(e){}
  s=s.replace(/,\s*([}\]])/g,'$1');
  try{return JSON.parse(s)}catch(e){}
  return null;
}

      +'<div class="sb" style="background:rgba(0,0,0,.2)"><div class="sv" style="color:'+(totalOk?'var(--ok)':'var(--dng)')+'">'+totalH+'</div><div class="sl">Total</div><div style="font-size:9px;color:var(--mut);margin-top:2px">Rec: 7–8h</div></div>'

        var avgLight=recs.length?recs.reduce(function(s,r){return s+(r.light_minutes||0)},0)/recs.length/60:0;
        var avgTotal=recs.length?recs.reduce(function(s,r){return s+(r.total_minutes||0)},0)/recs.length/60:0;

      lightData=chartDays.map(function(d){var r=SLEEP.find(function(s){return s.date===d});return r?parseFloat(((r.light_minutes||0)/60).toFixed(2)):0});
      awakeData=chartDays.map(function(d){var r=SLEEP.find(function(s){return s.date===d});if(!r)return 0;var tot=(r.total_minutes||0)/60;var deep=(r.deep_minutes||0)/60;var light=(r.light_minutes||0)/60;return parseFloat(Math.max(0,tot-deep-light).toFixed(2))});
    }
    _sleepChart=new Chart(ctx,{type:'bar',data:{labels:labels,datasets:[{label:'Profundo',data:deepData,backgroundColor:'#8b5cf6cc'},{label:'Ligero',data:lightData,backgroundColor:'#00d4aa88'},{label:'Despierto',data:awakeData,backgroundColor:'#ef444455'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8ba3bf',font:{size:9}}}},scales:{x:{stacked:true,ticks:{color:'#8ba3bf',font:{size:9},maxRotation:0,autoSkip:true,maxTicksLimit:weekly?12:10},grid:{color:'#1e3a5f'}},y:{stacked:true,ticks:{color:'#8ba3bf',font:{size:9},callback:function(v){return v+'h'}},grid:{color:'#1e3a5f'}}}}});

function saveSueno(){
  var date=gv('sld')||_sd,st=gv('slst'),et=gv('slet');

}

var _chatHistory=[];
var _chatThinking=false;
var _chatWelcomed=false;

function buildAgentSystem(){
  var name=P.name||'el usuario';
  var age=P.age?'Edad: '+P.age+' años.':'';
  var dx=P.diagnosis?'Diagnósticos: '+P.diagnosis+'.':'';
  var allg=P.allergies?'Alergias: '+P.allergies+'.':'';
  var wt=P.weight?'Peso: '+P.weight+'kg.':'';
  var ht=P.height?'Talla: '+P.height+'cm.':'';
  var bl=P.bloodType?'Grupo sanguíneo: '+P.bloodType+'.':'';

  var activeMeds=MEDS.filter(function(m){return m.active});
  var medsStr=activeMeds.length
    ?activeMeds.map(function(m){return m.name+' '+m.dose+' '+m.unit+' ('+m.frequency+')'}).join('; ')
    :'ninguno registrado';

  var sortedV=[].concat(VITALS).sort(function(a,b){return(b.date+b.time).localeCompare(a.date+a.time)});
  var lastV=sortedV.slice(0,5);
  var vitStr=lastV.length
    ?lastV.map(function(v){return v.date+': PA '+(v.bp_sys||'—')+'/'+(v.bp_dia||'—')+', Pulso '+(v.pulse||'—')+'lpm, Gluc '+(v.glucose||'—')+', Peso '+(v.weight||'—')+'kg'}).join('\n')
    :'sin registros';

  var sortedEx=[].concat(EXAMS).sort(function(a,b){return b.date.localeCompare(a.date)});
  var lastEx=sortedEx[0];
  var examStr=lastEx
    ?'Último examen: '+(ETL[lastEx.type]||lastEx.type)+' del '+fdl(lastEx.date)+'. Parámetros: '+Object.entries(lastEx.parameters||{}).map(function(e){return e[0].replace(/_/g,' ')+': '+e[1].value+' '+(e[1].unit||'')+(e[1].status&&e[1].status!=='normal'?' ['+e[1].status.toUpperCase()+']':'')}).join(', ')+'.'
    :'sin exámenes registrados';

  var specs=(P.specialists||[]).filter(function(s){return s.name});
  var specStr=specs.length
    ?specs.map(function(s){return s.specialty+': Dr. '+s.name+(s.phone?' ('+s.phone+')':'')}).join('; ')
    :'sin especialistas registrados';

  var last14=lastNDays(14);
  var sleepLast14=last14.map(function(d){return SLEEP.find(function(s){return s.date===d})||null}).filter(Boolean);
  var sleepStr='sin registros';
  if(sleepLast14.length){
    var avgTotal=(sleepLast14.reduce(function(s,r){return s+(r.total_minutes||0)},0)/sleepLast14.length/60).toFixed(1);
    var avgDeep=(sleepLast14.reduce(function(s,r){return s+(r.deep_minutes||0)},0)/sleepLast14.length/60).toFixed(1);
    var nightsUnder6=sleepLast14.filter(function(r){return(r.total_minutes||0)<360}).length;
    sleepStr='Promedio total: '+avgTotal+'h · Promedio profundo: '+avgDeep+'h · Noches <6h: '+nightsUnder6+' de '+sleepLast14.length;
  }
  return 'Eres el asistente de salud personal de '+name+'. Eres experto en medicina interna, cardiología y nefrología. Respondes en español, en tono amigable pero preciso. NUNCA reemplazas la consulta médica — siempre recomiendas consultar al especialista para decisiones importantes.\n\n'
    +'DATOS DEL PACIENTE:\n'
    +'Nombre: '+name+'. '+age+' '+wt+' '+ht+' '+bl+'\n'
    +(dx?dx+'\n':'')
    +(allg?allg+'\n':'')
    +'\nMEDICAMENTOS ACTIVOS:\n'+medsStr+'\n'
    +'\nÚLTIMOS SIGNOS VITALES:\n'+vitStr+'\n'
    +'\n'+examStr+'\n'
    +'\nESPECIALISTAS:\n'+specStr+'\n'
    +'\nSUEÑO ÚLTIMAS 2 SEMANAS:\n'+sleepStr+'\n'
    +'NOTA CLÍNICA: El paciente tiene apnea del sueño diagnosticada, relacionada con hipertensión, resistencia a insulina y fatiga. Considerar esto al dar recomendaciones de ejercicio, alimentación y horarios.\n'
    +'\nResponde de forma concisa. Si el usuario pregunta sobre un valor específico de sus últimos registros, puedes responder directamente con ese dato.';
}

function sendWelcomeMessage(){
  if(_chatWelcomed)return;
  _chatWelcomed=true;
  var name=(P.name||'').split(' ')[0]||'';
  var sortedV=[].concat(VITALS).sort(function(a,b){return(b.date+b.time).localeCompare(a.date+a.time)});
  var lv=sortedV[0];
  var dato='';
  var lvSys=lv&&(lv.bp_sys||lv.systolic);
  var lvDia=lv&&(lv.bp_dia||lv.diastolic);
  if(lv && lvSys && lvDia){
    dato=' Tu última presión arterial registrada el '+fdl(lv.date)+' fue '+lvSys+'/'+lvDia+' mmHg'+(lv.glucose?' y tu glucosa '+lv.glucose+' mg/dL':'')+'.';
  } else if(lv && lv.glucose){
    dato=' Tu último registro del '+fdl(lv.date)+' mostró glucosa '+lv.glucose+' mg/dL.';
  }
  var txt='Hola'+(name?' '+name:'')+', soy tu asistente de salud MUNDIMED.'+dato+' ¿En qué puedo ayudarte hoy?';
  _chatHistory.push({role:'assistant',content:txt});
  refreshChatArea();
}

function rAgent(c){
  c.innerHTML='<div style="display:flex;flex-direction:column;height:calc(100vh - 140px)">'
    +'<div id="chatArea" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding-bottom:8px"></div>'
    +'<div style="padding-top:8px;border-top:1px solid var(--bdr)">'
    +'<div style="display:flex;gap:8px;align-items:flex-end">'
    +'<textarea id="chatInput" rows="2" placeholder="Escribe tu mensaje..." style="flex:1;resize:none;font-size:14px;padding:10px 12px;border-radius:10px" onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();sendAgentMsg()}"></textarea>'
    +'<button class="btn bp" onclick="sendAgentMsg()" style="height:44px;padding:0 16px;white-space:nowrap">Enviar</button>'
    +'</div>'
    +'<button class="btn bg" onclick="newConversation()" style="width:100%;margin-top:8px;font-size:12px">Nueva conversación</button>'
    +'</div>'
    +'</div>';
  refreshChatArea();
  if(!_chatWelcomed)sendWelcomeMessage();
  else scrollChatToBottom();
}

function refreshChatArea(){
  var area=g('chatArea');
  if(!area)return;
  var html='';
  _chatHistory.forEach(function(m){
    if(m.role==='user'){
      html+='<div style="display:flex;justify-content:flex-end"><div style="background:var(--pri);color:#0a1628;border-radius:14px 14px 2px 14px;padding:10px 14px;max-width:80%;font-size:14px;line-height:1.5">'+esc(m.content)+'</div></div>';
    } else {
      html+='<div style="display:flex;justify-content:flex-start"><div style="background:var(--card);border:1px solid var(--bdr);border-radius:14px 14px 14px 2px;padding:10px 14px;max-width:88%;font-size:14px;line-height:1.6;white-space:pre-wrap">'+esc(m.content)+'</div></div>';
    }
  });
  if(_chatThinking){
    html+='<div style="display:flex;justify-content:flex-start"><div style="background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:10px 14px;color:var(--mut);font-size:13px">pensando...</div></div>';
  }
  area.innerHTML=html;
  scrollChatToBottom();
}

function scrollChatToBottom(){
  var area=g('chatArea');
  if(area)area.scrollTop=area.scrollHeight;
}

async function sendAgentMsg(){
  var inp=g('chatInput');
  if(!inp)return;
  var txt=(inp.value||'').trim();
  if(!txt||_chatThinking)return;
  inp.value='';
  _chatHistory.push({role:'user',content:txt});
  _chatThinking=true;
  refreshChatArea();
  try{
    var msgs=_chatHistory.map(function(m){return{role:m.role,content:m.content}});
    var r=await fetch(BACKEND+'/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system:buildAgentSystem(),messages:msgs,max_tokens:1000})});
    if(!r.ok){var err=await r.json();throw new Error(err.error||'Error '+r.status)}
    var d=await r.json();
    if(d.error)throw new Error(d.error);
    _chatHistory.push({role:'assistant',content:d.text||''});
  }catch(err){
    _chatHistory.push({role:'assistant',content:'Lo siento, ocurrió un error: '+err.message});
  }
  _chatThinking=false;
  refreshChatArea();
}

function newConversation(){
  _chatHistory=[];
  _chatWelcomed=false;
  var area=g('chatArea');
  if(area)area.innerHTML='';
  sendWelcomeMessage();
}


// ===== SERVICE WORKER REGISTRATION =====
function registerSW() {
  if (!('serviceWorker' in navigator)) {
    console.log('Service Worker not supported');
    return;
  }
  navigator.serviceWorker.register('/sw.js').then(function(reg) {
    console.log('SW registered:', reg.scope);
    // Listen for messages from SW
    navigator.serviceWorker.addEventListener('message', function(e) {
      if (e.data.type === 'CONFIRM_DOSE') {
        confirmAlarmDose(e.data.medId, e.data.time);
      } else if (e.data.type === 'SNOOZE_DOSE') {
        // SW handles snooze internally, just update UI
        if (TAB === 'meds') render();
      }
    });
  }).catch(function(err) {
    console.warn('SW registration failed:', err);
  });
}

function confirmAlarmDose(medId, time) {
  var t = today();
  var idx = DOSES.findIndex(function(d) {
    return d.medId === medId && d.time === time && d.date === t;
  });
  if (idx < 0) {
    DOSES.push({ id: uid(), medId: medId, date: t, time: time, taken: true });
    saveAll();
  }
  if (TAB === 'meds') render();
  // Reschedule alarms
  scheduleAlarmsInSW();
}

function scheduleAlarmsInSW() {
  if (!('serviceWorker' in navigator) || !navigator.serviceWorker.controller) return;
  
  // Request notification permission first
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission().then(function(perm) {
      if (perm === 'granted') doScheduleAlarms();
    });
  } else if (Notification.permission === 'granted') {
    doScheduleAlarms();
  }
}

function doScheduleAlarms() {
  var t = today();
  var takenDoses = DOSES.filter(function(d) { return d.date === t; });
  var alarms = [];
  
  MEDS.filter(function(m) { return m.active; }).forEach(function(med) {
    (med.times || ['08:00']).forEach(function(time) {
      var taken = takenDoses.some(function(d) {
        return d.medId === med.id && d.time === time;
      });
      if (!taken) {
        alarms.push({
          medId: med.id,
          medName: med.name,
          dose: med.dose,
          unit: med.unit,
          time: time,
          date: t,
          taken: false
        });
      }
    });
  });
  
  navigator.serviceWorker.controller.postMessage({
    type: 'SCHEDULE_ALARMS',
    alarms: alarms
  });
  
  console.log('Scheduled', alarms.length, 'alarms in SW');
}

// ===== SISTEMA DE ALERTAS DE MEDICAMENTOS =====
var _alarmActive=false;
var _alarmSound=null;
var _alarmInterval=null;

function initAlarms(){
  // Register service worker for background notifications
  registerSW();
  
  // Request notification permission
  if('Notification' in window && Notification.permission==='default'){
    Notification.requestPermission().then(function(perm){
      if(perm==='granted'){
        setTimeout(scheduleAlarmsInSW, 2000); // wait for SW to be ready
      }
    });
  } else if(Notification.permission==='granted'){
    setTimeout(scheduleAlarmsInSW, 2000);
  }
  
  // Fallback: also check every 30 seconds while app is open
  if(_alarmInterval)clearInterval(_alarmInterval);
  _alarmInterval=setInterval(checkMedAlarms,30000);
  checkMedAlarms();
}

function checkMedAlarms(){
  if(_alarmActive)return; // don't stack alarms
  const now=new Date();
  const hh=String(now.getHours()).padStart(2,'0');
  const mm=String(now.getMinutes()).padStart(2,'0');
  const timeNow=hh+':'+mm;
  const t=today();
  const takenDoses=DOSES.filter(function(d){return d.date===t});
  const activeMeds=MEDS.filter(function(m){return m.active});

  for(var i=0;i<activeMeds.length;i++){
    var med=activeMeds[i];
    var times=med.times||['08:00'];
    for(var j=0;j<times.length;j++){
      var medTime=times[j];
      // Check if within 1 minute window
      var alreadyTaken=takenDoses.some(function(d){return d.medId===med.id&&d.time===medTime});
      if(!alreadyTaken && timeNow===medTime){
        triggerAlarm(med,medTime);
        return;
      }
    }
  }
}

function playAlarmSound(){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    function beep(freq,start,dur,vol){
      var o=ctx.createOscillator();
      var g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=freq;
      o.type='sine';
      g.gain.setValueAtTime(0,ctx.currentTime+start);
      g.gain.linearRampToValueAtTime(vol,ctx.currentTime+start+0.05);
      g.gain.linearRampToValueAtTime(0,ctx.currentTime+start+dur);
      o.start(ctx.currentTime+start);
      o.stop(ctx.currentTime+start+dur+0.1);
    }
    // Medical alert sound: 3 ascending beeps
    beep(880,0,0.2,0.6);
    beep(1100,0.3,0.2,0.6);
    beep(1320,0.6,0.4,0.7);
    beep(880,1.2,0.2,0.5);
    beep(1100,1.5,0.2,0.5);
    beep(1320,1.8,0.4,0.6);
    return ctx;
  }catch(e){console.warn('Audio error:',e);return null}
}

var _currentAlarmMedId=null;
var _currentAlarmTime=null;
var _soundInterval=null;
function triggerAlarm(med,time){
  if(_alarmActive)return;
  _alarmActive=true;
  _currentAlarmMedId=med.id;
  _currentAlarmTime=time;

  // Add CSS
  if(!document.getElementById('alarm_style')){
    var st=document.createElement('style');
    st.id='alarm_style';
    st.textContent='@keyframes alarmPulse{0%,100%{background:rgba(0,0,0,.88)}50%{background:rgba(239,68,68,.3)}}@keyframes iconBounce{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}';
    document.head.appendChild(st);
  }

  // Build overlay with DOM elements (avoids quote issues)
  var overlay=document.createElement('div');
  overlay.id='alarm_overlay';
  overlay.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.88);z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px;animation:alarmPulse 1.2s infinite';

  var box=document.createElement('div');
  box.style.cssText='background:linear-gradient(135deg,#0f2040,#162a4a);border:3px solid #ef4444;border-radius:20px;padding:28px 20px;max-width:340px;width:100%;text-align:center;box-shadow:0 0 60px rgba(239,68,68,.5)';

  var icon=document.createElement('div');
  icon.style.cssText='font-size:60px;animation:iconBounce 1s infinite;margin-bottom:12px';
  icon.textContent='💊';
  box.appendChild(icon);

  var lbl=document.createElement('div');
  lbl.style.cssText='font-size:13px;color:#ef4444;font-weight:700;letter-spacing:1.5px;margin-bottom:10px';
  lbl.textContent='⏰ HORA DEL MEDICAMENTO';
  box.appendChild(lbl);

  var nm=document.createElement('div');
  nm.style.cssText='font-size:24px;font-weight:700;color:#e8f4f8;margin-bottom:6px';
  nm.textContent=med.name;
  box.appendChild(nm);

  var ds=document.createElement('div');
  ds.style.cssText='font-size:17px;color:#00d4aa;font-weight:600;margin-bottom:4px';
  ds.textContent=med.dose+' '+med.unit;
  box.appendChild(ds);

  if(med.indication){var ind=document.createElement('div');ind.style.cssText='font-size:12px;color:#8ba3bf;margin-bottom:6px';ind.textContent=med.indication;box.appendChild(ind)}

  var tm=document.createElement('div');
  tm.style.cssText='font-size:28px;font-weight:700;color:#f59e0b;margin:14px 0';
  tm.textContent='🕐 '+time;
  box.appendChild(tm);

  var btnC=document.createElement('button');
  btnC.style.cssText='background:#10b981;color:#fff;border:none;border-radius:12px;padding:18px;font-size:16px;font-weight:700;cursor:pointer;width:100%;margin-top:4px;font-family:DM Sans,sans-serif';
  btnC.textContent='✅  Ya tomé el medicamento';
  btnC.addEventListener('click',function(){confirmAlarm(_currentAlarmMedId,_currentAlarmTime)});
  box.appendChild(btnC);

  var btnS=document.createElement('button');
  btnS.style.cssText='background:transparent;color:#8ba3bf;border:1px solid #1e3a5f;border-radius:12px;padding:12px;font-size:13px;cursor:pointer;width:100%;margin-top:10px;font-family:DM Sans,sans-serif';
  btnS.textContent='⏱  Recordarme en 5 minutos';
  btnS.addEventListener('click',function(){snoozeAlarm()});
  box.appendChild(btnS);

  overlay.appendChild(box);
  document.body.appendChild(overlay);

  // Sound
  playAlarmSound();
  _soundInterval=setInterval(function(){if(!_alarmActive){clearInterval(_soundInterval);return}playAlarmSound()},4000);

  // Browser notification
  if('Notification' in window && Notification.permission==='granted'){
    try{new Notification('💊 MUNDIMED',{body:'Tomar: '+med.name+' '+med.dose+' '+med.unit+' a las '+time,requireInteraction:true})}catch(e){}
  }
}

function confirmAlarm(medId,time){
  // Mark as taken
  const t=today();
  const idx=DOSES.findIndex(function(d){return d.medId===medId&&d.time===time&&d.date===t});
  if(idx<0)DOSES.push({id:uid(),medId:medId,date:t,time:time,taken:true});
  saveAll();
  dismissAlarm();
  if(TAB==='meds')render();
}

function snoozeAlarm(){
  var medId=_currentAlarmMedId;
  var time=_currentAlarmTime;
  dismissAlarm();
  setTimeout(function(){
    if(medId&&time){
      var medObj=MEDS.find(function(m){return m.id===medId});
      if(medObj){
        var taken=DOSES.some(function(d){return d.medId===medId&&d.time===time&&d.date===today()});
        if(!taken)triggerAlarm(medObj,time);
      }
    }
  },5*60*1000);
}

function dismissAlarm(){
  _alarmActive=false;
  if(_soundInterval){clearInterval(_soundInterval);_soundInterval=null}
  var overlay=document.getElementById('alarm_overlay');
  if(overlay)overlay.remove();
}
// INIT
navRender();qsRender();render();
initAlarms();
loadFromBackend().then(function(){navRender();qsRender();render()}).catch(function(){});

</script>
